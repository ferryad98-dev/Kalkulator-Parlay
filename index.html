<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARLAY • Kalkulator Parlay</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2310b981'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(15, 28, 26, 0.95); backdrop-filter: blur(20px); }
        
        .neon-text {
            text-shadow: 0 0 15px #10b981, 0 0 30px #10b981;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#0a1f1a] via-[#05130f] to-black text-white min-h-screen">

<div class="max-w-6xl mx-auto px-6 py-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">⚽</div>
            <h1 class="title-font text-4xl font-bold tracking-tighter">PARLAY</h1>
        </div>
        <div class="px-5 py-1.5 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-medium rounded-3xl">
            V2.0 • Modern
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- LEFT CARD -->
        <div class="lg:col-span-7 glass border border-white/10 rounded-3xl p-7">
            <div class="mb-7">
                <label class="text-emerald-400 text-xs font-medium mb-2 block">JUMLAH TARUHAN</label>
                <div class="bg-[#11221f] border border-white/10 rounded-3xl px-7 py-6 flex items-center">
                    <span class="text-3xl text-zinc-400 mr-4">Rp</span>
                    <input id="jumlah-taruhan" type="text" 
                           class="bg-transparent outline-none flex-1 text-4xl font-semibold text-right min-w-0"
                           placeholder="100.000" autofocus>
                </div>
            </div>

            <div id="odds-container" class="space-y-4"></div>

            <div class="flex gap-3 mt-8">
                <button id="tambah-odds" class="flex-1 bg-white text-black font-semibold py-5 rounded-3xl text-lg flex items-center justify-center gap-2 hover:bg-emerald-400 transition-all">
                    <i class="fas fa-plus"></i> TAMBAH ODDS
                </button>
                <button id="kurangi-odds" class="flex-1 bg-[#11221f] hover:bg-red-600 font-semibold py-5 rounded-3xl text-lg transition-all">
                    KURANGI ODDS
                </button>
                <button id="contoh-parlay" class="flex-1 bg-emerald-600 hover:bg-emerald-500 font-semibold py-5 rounded-3xl text-lg flex items-center justify-center gap-2 transition-all">
                    <i class="fas fa-pencil"></i> CONTOH PARLAY
                </button>
            </div>
        </div>

        <!-- RIGHT CARD -->
        <div class="lg:col-span-5">
            <div class="glass border border-emerald-500/30 rounded-3xl p-7 h-full flex flex-col">
                <div>
                    <label class="text-emerald-400 text-xs font-medium mb-2 block">TOTAL KEMENANGAN</label>
                    <div id="total-area" class="relative min-h-[88px] flex items-center justify-center">
                        <div id="loading-spinner" class="hidden flex flex-col items-center">
                            <div class="spinner"></div>
                            <p class="text-emerald-400 text-xs mt-3">MENGHITUNG...</p>
                        </div>
                        <div id="result-content">
                            <div id="total-kemenangan" class="text-5xl font-bold neon-text">Rp 0</div>
                        </div>
                    </div>
                    
                    <div class="bg-black/70 inline-flex items-center rounded-3xl px-6 py-3 gap-3 mt-4">
                        <span class="text-emerald-400 font-medium">MULTIPLIER</span>
                        <span id="multiplier" class="text-3xl font-bold text-emerald-400 neon-text">x1.00</span>
                    </div>
                </div>

                <div class="mt-8 flex-1">
                    <h3 class="flex items-center gap-2 text-emerald-400 font-medium mb-4 text-sm">
                        <i class="fas fa-list-check"></i> BREAKDOWN PARLAY
                    </h3>
                    <div id="breakdown" class="space-y-4 text-sm"></div>
                </div>

                <div class="flex gap-3 mt-8">
                    <button id="reset" class="flex-1 py-5 bg-[#11221f] hover:bg-zinc-700 rounded-3xl font-semibold text-base flex items-center justify-center gap-2">
                        <i class="fas fa-rotate-right"></i> RESET
                    </button>
                    <button id="copy-result" class="flex-1 py-5 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold text-base flex items-center justify-center gap-2">
                        <i class="fas fa-copy"></i> COPY HASIL
                    </button>
                    <button id="share-wa" class="flex-1 py-5 bg-green-500 hover:bg-green-600 rounded-3xl font-semibold text-base flex items-center justify-center gap-2">
                        <i class="fab fa-whatsapp"></i> SHARE WA
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SUPPORTED BY - SEMUA BANNER LANGSUNG TERLIHAT -->
    <div class="mt-14 text-center">
        <p class="text-zinc-500 text-xs tracking-widest mb-5">SUPPORTED BY</p>
        <div class="flex flex-wrap justify-center items-center gap-4">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_dewapoker_dewapoker_gif_720x89.gif" alt="Dewapoker" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_poker88_POKER88_Banners_2.gif" alt="Poker88" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_dominobet_dominobet_gif_720x89.gif" alt="Dominobet" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_nagapoker_nagapoker-gift.gif" alt="Nagapoker" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_lapak303_lapak303_gif_720x89.gif" alt="Lapak303" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_kartupoker_kartupoker_gif_720x89.gif" alt="Kartupoker" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_domino88_domino88_gif_720x89.gif" alt="Domino88" class="h-12">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_remipoker_remipoker_gif_720x89.gif" alt="Remipoker" class="h-12">
        </div>
    </div>
</div>

<script>
    // Script tetap sama seperti sebelumnya
    tailwind.config = { content: ["./**/*.{html,js}"] }

    const jumlahTaruhanInput = document.getElementById('jumlah-taruhan')
    const oddsContainer = document.getElementById('odds-container')
    const totalKemenanganEl = document.getElementById('total-kemenangan')
    const multiplierEl = document.getElementById('multiplier')
    const breakdownEl = document.getElementById('breakdown')
    const tambahBtn = document.getElementById('tambah-odds')
    const kurangiBtn = document.getElementById('kurangi-odds')
    const resetBtn = document.getElementById('reset')
    const copyBtn = document.getElementById('copy-result')
    const contohBtn = document.getElementById('contoh-parlay')
    const shareWaBtn = document.getElementById('share-wa')
    const loadingSpinner = document.getElementById('loading-spinner')
    const resultContent = document.getElementById('result-content')

    let oddsCount = 3

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka).replace('Rp', 'Rp ')
    }

    function formatRibuan(value) {
        return value.replace(/\B(?=(\d{3})+(?!\d))/g, ".")
    }

    function countUp(element, target) {
        let start = 0
        const duration = 600
        const startTime = performance.now()
        function animate(currentTime) {
            const elapsed = currentTime - startTime
            const progress = Math.min(elapsed / duration, 1)
            const value = Math.floor(progress * target)
            element.textContent = formatRupiah(value)
            if (progress < 1) requestAnimationFrame(animate)
            else element.textContent = formatRupiah(target)
        }
        requestAnimationFrame(animate)
    }

    function showLoading() {
        resultContent.classList.add('hidden')
        loadingSpinner.classList.remove('hidden')
    }

    function hideLoading() {
        loadingSpinner.classList.add('hidden')
        resultContent.classList.remove('hidden')
    }

    function createOddRow(index) {
        const div = document.createElement('div')
        div.className = 'bg-[#11221f] border border-white/10 rounded-3xl p-6 grid grid-cols-2 gap-6'
        div.innerHTML = `
            <div>
                <label class="text-xs text-zinc-400 block mb-1">Odds ${index}</label>
                <input type="text" class="odds w-full bg-transparent text-4xl font-semibold outline-none" placeholder="1,85">
            </div>
            <div>
                <label class="text-xs text-zinc-400 block mb-1">Hasil</label>
                <select class="hasil w-full bg-[#0a1a17] border border-white/10 rounded-3xl px-4 py-4 text-base outline-none">
                    <option value="menang">Menang</option>
                    <option value="menang-setengah">Menang Setengah</option>
                    <option value="seri">Seri</option>
                    <option value="kalah-setengah">Kalah Setengah</option>
                    <option value="kalah">Kalah</option>
                </select>
            </div>
        `
        return div
    }

    function renderOdds() {
        oddsContainer.innerHTML = ''
        for (let i = 1; i <= oddsCount; i++) {
            oddsContainer.appendChild(createOddRow(i))
        }
        calculateParlay()
    }

    function calculateParlay() {
        const jumlahStr = jumlahTaruhanInput.value.replace(/\./g, '').replace(',', '.')
        const jumlah = parseFloat(jumlahStr) || 0

        const oddsInputs = oddsContainer.querySelectorAll('.odds')
        const hasilSelects = oddsContainer.querySelectorAll('.hasil')

        let totalMultiplier = 1
        let kalah = false
        let breakdownHTML = ''

        oddsInputs.forEach((input, i) => {
            let oddsStr = input.value.replace(',', '.')
            const odds = parseFloat(oddsStr) || 1
            const hasil = hasilSelects[i].value
            let multiplier = 1

            if (hasil === 'kalah') { kalah = true; multiplier = 0 }
            else if (hasil === 'menang-setengah') multiplier = (odds + 1) / 2
            else if (hasil === 'seri') multiplier = 1
            else if (hasil === 'kalah-setengah') multiplier = 0.5
            else multiplier = odds

            totalMultiplier *= multiplier

            breakdownHTML += `
                <div class="flex justify-between py-2 border-b border-white/10 last:border-none text-sm">
                    <span class="font-medium">Odds ${i+1} <span class="text-zinc-400">(${hasil.replace('-', ' ')})</span></span>
                    <span class="font-mono text-emerald-400">${multiplier.toFixed(2)}x</span>
                </div>`
        })

        const total = kalah ? 0 : jumlah * totalMultiplier
        countUp(totalKemenanganEl, total)
        multiplierEl.textContent = `x${totalMultiplier.toFixed(2)}`
        breakdownEl.innerHTML = breakdownHTML || '<p class="text-zinc-400 italic text-center py-6 text-sm">Isi jumlah taruhan & odds untuk melihat hasil</p>'
    }

    tambahBtn.addEventListener('click', () => { oddsCount++; renderOdds() })
    kurangiBtn.addEventListener('click', () => { if (oddsCount > 1) { oddsCount--; renderOdds() } })

    resetBtn.addEventListener('click', () => {
        jumlahTaruhanInput.value = ''
        oddsCount = 3
        renderOdds()
    })

    copyBtn.addEventListener('click', () => {
        const text = `Parlay\nTotal: ${totalKemenanganEl.textContent}\nMultiplier: ${multiplierEl.textContent}`
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerHTML = `✅ COPIED!`
            setTimeout(() => { copyBtn.innerHTML = `<i class="fas fa-copy"></i> COPY HASIL` }, 1800)
        })
    })

    shareWaBtn.addEventListener('click', () => {
        const total = totalKemenanganEl.textContent
        const multiplier = multiplierEl.textContent
        const message = `🎯 PARLAY CALCULATOR\n\nTotal Kemenangan: ${total}\nMultiplier: ${multiplier}\n\nDihitung di https://kalkulator-parlay.vercel.app/`
        const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`
        window.open(waUrl, '_blank')
    })

    contohBtn.addEventListener('click', () => {
        showLoading()
        setTimeout(() => {
            jumlahTaruhanInput.value = '100000'
            oddsCount = 3
            renderOdds()
            const oddsInputs = oddsContainer.querySelectorAll('.odds')
            oddsInputs.forEach(input => input.value = '1,85')
            hideLoading()
            calculateParlay()
        }, 600)
    })

    function addListeners() {
        oddsContainer.addEventListener('input', calculateParlay)
        oddsContainer.addEventListener('change', calculateParlay)
        jumlahTaruhanInput.addEventListener('input', () => {
            let val = jumlahTaruhanInput.value.replace(/[^0-9]/g, '')
            jumlahTaruhanInput.value = formatRibuan(val)
            calculateParlay()
        })
    }

    renderOdds()
    addListeners()
</script>
</body>
</html>
