<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARLAY • Kalkulator Parlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glass {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#0a1f1a] to-[#000000] text-white min-h-screen">

<div class="max-w-5xl mx-auto px-6 py-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">⚽</div>
            <h1 class="title-font text-5xl font-bold tracking-tighter">PARLAY</h1>
        </div>
        <div class="px-5 py-2 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm font-medium rounded-3xl">
            V2.0 • Modern
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- LEFT: Input -->
        <div class="lg:col-span-7 glass border border-white/10 rounded-3xl p-8">
            
            <!-- Jumlah Taruhan -->
            <div class="mb-8">
                <label class="block text-emerald-400 text-sm font-medium mb-3">JUMLAH TARUHAN</label>
                <div class="relative">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-4xl text-zinc-400">Rp</span>
                    <input id="jumlah-taruhan" type="text"
                           class="w-full bg-[#1a2a27] border border-white/20 focus:border-emerald-500 rounded-2xl px-14 py-7 text-6xl font-semibold outline-none text-white"
                           value="100000">
                </div>
            </div>

            <!-- Odds -->
            <div id="odds-container" class="space-y-6"></div>

            <div class="flex gap-4 mt-10">
                <button id="tambah-odds" 
                        class="flex-1 bg-white text-black font-semibold py-5 rounded-2xl text-xl flex items-center justify-center gap-2 hover:bg-emerald-400 transition-all">
                    <i class="fas fa-plus"></i> TAMBAH ODDS
                </button>
                <button id="kurangi-odds"
                        class="flex-1 bg-[#1a2a27] hover:bg-red-600 font-semibold py-5 rounded-2xl text-xl transition-all">
                    KURANGI ODDS
                </button>
            </div>
        </div>

        <!-- RIGHT: Result -->
        <div class="lg:col-span-5">
            <div class="glass border border-emerald-500/30 rounded-3xl p-8 h-full flex flex-col">

                <!-- Total Kemenangan -->
                <div class="mb-8">
                    <label class="block text-emerald-400 text-sm font-medium mb-3">TOTAL KEMENANGAN</label>
                    <div id="total-kemenangan" class="text-6xl font-bold leading-none mb-4">Rp 633.162,5</div>
                    <div class="inline-flex bg-black/60 rounded-2xl px-6 py-3 items-center gap-3">
                        <span class="text-emerald-400 font-medium">MULTIPLIER</span>
                        <span id="multiplier" class="text-4xl font-bold text-emerald-400">x6.33</span>
                    </div>
                </div>

                <!-- Breakdown -->
                <div class="flex-1">
                    <h3 class="flex items-center gap-2 text-emerald-400 font-medium mb-5">
                        <i class="fas fa-list-check"></i> BREAKDOWN PARLAY
                    </h3>
                    <div id="breakdown" class="space-y-4"></div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-4 mt-8">
                    <button id="reset" 
                            class="flex-1 py-5 bg-[#1a2a27] hover:bg-zinc-700 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2">
                        <i class="fas fa-rotate-right"></i> RESET
                    </button>
                    <button id="copy-result" 
                            class="flex-1 py-5 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2">
                        <i class="fas fa-copy"></i> COPY HASIL
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Supported By -->
    <div class="mt-16 text-center">
        <p class="text-zinc-500 text-sm tracking-widest mb-6">SUPPORTED BY</p>
        <div class="flex flex-wrap justify-center gap-4 opacity-90">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_dewapoker_dewapoker_gif_720x89.gif" alt="Dewapoker" class="h-12 rounded-xl">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_poker88_POKER88_Banners_2.gif" alt="Poker88" class="h-12 rounded-xl">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_dominobet_dominobet_gif_720x89.gif" alt="Dominobet" class="h-12 rounded-xl">
            <img src="https://bas3data.xyz/assets/Image/Brand/Logo/banneratas_nagapoker_nagapoker-gift.gif" alt="Nagapoker" class="h-12 rounded-xl">
        </div>
    </div>
</div>

<script>
    // Tailwind
    tailwind.config = { content: ["./**/*.{html,js}"] }

    const jumlahTaruhanInput = document.getElementById('jumlah-taruhan')
    const oddsContainer = document.getElementById('odds-container')
    const totalKemenanganEl = document.getElementById('total-kemenangan')
    const multiplierEl = document.getElementById('multiplier')
    const breakdownEl = document.getElementById('breakdown')
    const tambahBtn = document.getElementById('tambah-odds')
    const kurangiBtn = document.getElementById('kurangi-odds')
    const resetBtn = document.getElementById('reset')
    const copyBtn = document.getElementById('copy-result')

    let oddsCount = 3

    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { 
            style: 'currency', 
            currency: 'IDR', 
            minimumFractionDigits: 0 
        }).format(angka)
    }

    function formatRibuan(value) {
        return value.replace(/\B(?=(\d{3})+(?!\d))/g, ".")
    }

    function createOddRow(index) {
        const div = document.createElement('div')
        div.className = 'grid grid-cols-2 gap-4 bg-[#1a2a27] border border-white/10 rounded-2xl p-6'
        div.innerHTML = `
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Odds ${index}</label>
                <input type="number" class="odds w-full bg-transparent text-4xl font-semibold outline-none border-b border-white/20 focus:border-emerald-500 pb-2" value="1.85" step="0.01">
            </div>
            <div>
                <label class="block text-xs text-zinc-400 mb-1">Hasil</label>
                <select class="hasil w-full bg-[#111f1c] border border-white/20 rounded-2xl px-5 py-4 text-lg outline-none">
                    <option value="menang">Menang</option>
                    <option value="menang-setengah">Menang Setengah</option>
                    <option value="seri">Seri</option>
                    <option value="kalah-setengah">Kalah Setengah</option>
                    <option value="kalah">Kalah</option>
                </select>
            </div>
        `
        return div
    }

    function renderOdds() {
        oddsContainer.innerHTML = ''
        for (let i = 1; i <= oddsCount; i++) {
            oddsContainer.appendChild(createOddRow(i))
        }
        calculateParlay()
    }

    function calculateParlay() {
        const jumlah = parseFloat(jumlahTaruhanInput.value.replace(/\./g, '')) || 0
        const oddsInputs = oddsContainer.querySelectorAll('.odds')
        const hasilSelects = oddsContainer.querySelectorAll('.hasil')

        let totalMultiplier = 1
        let kalah = false
        let breakdownHTML = ''

        oddsInputs.forEach((input, i) => {
            const odds = parseFloat(input.value) || 1
            const hasil = hasilSelects[i].value
            let multiplier = 1

            if (hasil === 'kalah') { kalah = true; multiplier = 0 }
            else if (hasil === 'menang-setengah') multiplier = (odds + 1) / 2
            else if (hasil === 'seri') multiplier = 1
            else if (hasil === 'kalah-setengah') multiplier = 0.5
            else multiplier = odds

            totalMultiplier *= multiplier

            breakdownHTML += `
                <div class="flex justify-between items-center py-3 border-b border-white/10 last:border-none">
                    <span class="font-medium">Odds ${i+1} <span class="text-zinc-400 text-sm">(${hasil.replace('-', ' ')})</span></span>
                    <span class="font-mono text-emerald-400">${multiplier.toFixed(2)}x</span>
                </div>`
        })

        const total = kalah ? 0 : jumlah * totalMultiplier

        totalKemenanganEl.textContent = formatRupiah(total)
        multiplierEl.textContent = `x${totalMultiplier.toFixed(2)}`
        breakdownEl.innerHTML = breakdownHTML || '<p class="text-zinc-400 italic">Tambahkan odds untuk melihat breakdown</p>'
    }

    // Event listeners
    tambahBtn.addEventListener('click', () => { oddsCount++; renderOdds() })
    kurangiBtn.addEventListener('click', () => { if (oddsCount > 1) { oddsCount--; renderOdds() } })
    
    resetBtn.addEventListener('click', () => {
        jumlahTaruhanInput.value = '100000'
        oddsCount = 3
        renderOdds()
    })

    copyBtn.addEventListener('click', () => {
        const text = `Parlay\nJumlah: ${totalKemenanganEl.textContent}\nMultiplier: ${multiplierEl.textContent}`
        navigator.clipboard.writeText(text).then(() => {
            copyBtn.innerHTML = `✅ COPIED!`
            setTimeout(() => copyBtn.innerHTML = `<i class="fas fa-copy"></i> COPY HASIL`, 2000)
        })
    })

    // Real-time
    function addListeners() {
        oddsContainer.addEventListener('input', calculateParlay)
        oddsContainer.addEventListener('change', calculateParlay)
        jumlahTaruhanInput.addEventListener('input', () => {
            let val = jumlahTaruhanInput.value.replace(/[^0-9]/g, '')
            jumlahTaruhanInput.value = formatRibuan(val)
            calculateParlay()
        })
    }

    // Init
    renderOdds()
    addListeners()
</script>
</body>
</html>
